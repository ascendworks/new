name: Deploy to IONOS Deploy Now

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Deploy to IONOS Deploy Now
        uses: ionos-deploy-now/deploy-now-github-action@v1
        with:
          token: ${{ secrets.IONOS_API_KEY }}
          service-host: ${{ secrets.IONOS_SERVICE_HOST }}
          dist-folder: out
